# Self-contained ROS2 evaluation container for task2.
#
# The main docker/ stack (Isaac Sim/Lab) has no ROS2, so this service runs in its
# own jazzy image. It shares the host network to see the Isaac Sim ROS2 bridge DDS
# traffic. It runs on FastDDS (the base image default) and reads images over the
# standard RTPS/UDP path, so it interoperates with Isaac on either --ros2-bridge
# fastdds or cyclonedds with no DDS env tuning and ROS_DOMAIN_ID 0 on both sides.
#
# Artifacts persist to a host bind mount under ${ISAAC_DOCKER_ROOT} (created by
# setup.sh), mirroring how the main containers persist their caches/data.
#
# Usage:
#   bash scripts/evaluation/task2/setup.sh        # one-time: create volume + .env
#   bash scripts/evaluation/task2/run.sh up
#   bash scripts/evaluation/task2/run.sh evaluate

services:
  eval_task2:
    build:
      # Build context is the repo root so the bind-mounted code matches the image layout.
      context: ../../..
      dockerfile: scripts/evaluation/task2/Dockerfile
    image: eval-task2:iros2026-ebim
    container_name: eval_task2
    profiles: ["eval"]
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    network_mode: host
    working_dir: /workspace
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      python3 /workspace/scripts/evaluation/task2/main.py --output-dir /output"
    volumes:
      # Repo code (flat eval modules importable via PYTHONPATH set in the image).
      - type: bind
        source: ../../..
        target: /workspace
      # Persistent artifact volume on the host.
      - type: bind
        source: ${ISAAC_DOCKER_ROOT:-${HOME}/docker/iros-workshop}/eval-task2
        target: /output
    restart: unless-stopped
    tty: true
    stdin_open: true
